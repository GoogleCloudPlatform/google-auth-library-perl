name: CI

on:
  push:
    branches: [ main, 'feature/*', 'refactor/*' ]
  pull_request:
    branches: [ main, 'feature/*', 'refactor/*' ]

jobs:
  container-matrix:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Debian 12
            image: debian:12-slim
            prep: "apt-get update && apt-get install -y perl cpanminus build-essential protobuf-compiler libssl-dev git libtemplate-perl libpath-tiny-perl"
          - name: Ubuntu 24.04
            image: ubuntu:24.04
            prep: "apt-get update && apt-get install -y perl cpanminus build-essential protobuf-compiler libssl-dev git libtemplate-perl libpath-tiny-perl"
          - name: Rocky Linux 9
            image: rockylinux:9
            prep: "dnf install -y epel-release dnf-plugins-core && dnf config-manager --set-enabled crb && dnf install -y perl perl-App-cpanminus gcc make protobuf-compiler openssl-devel git && cpanm --notest Template Path::Tiny"
          - name: Perl 5.40
            image: perl:5.40-slim
            prep: "apt-get update && apt-get install -y build-essential protobuf-compiler libssl-dev git cpanminus && cpanm --notest Template Path::Tiny"
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Build and Test Suite
        run: |
          docker run --rm -v ${{ github.workspace }}:/repo ${{ matrix.image }} bash -c \
            "${{ matrix.prep }} && cp -a /repo /tmp/work && cd /tmp/work && cpanm --notest --installdeps ./Protobuf ./Google-Auth ./Google-gRPC ./Google-Api-Common ./Module-Starter-Protobuf && perl .github/scripts/build_and_test.pl Protobuf Google-Auth Google-gRPC Google-Api-Common Module-Starter-Protobuf"

  native-matrix:
    name: Windows Perl ${{ matrix.perl-version }}
    runs-on: [self-hosted, Windows]
    strategy:
      fail-fast: false
      matrix:
        perl-version: ['5.38', '5.40', '5.42']

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Build and Test Suite
        shell: powershell
        run: |
          perl .github/scripts/build_and_test.pl Protobuf Google-Auth Google-gRPC Google-Api-Common Module-Starter-Protobuf

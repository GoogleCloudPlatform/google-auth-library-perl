name: CI

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main, 'feature/*', 'refactor/*' ]

jobs:
  container-matrix:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Debian 12
            image: us-docker.pkg.dev/perl-cloud-ci/perl-cloud-ci-images/google-cloud-perl-ci-debian:latest
            public-image: debian:bookworm-slim
          - name: Ubuntu 24.04
            image: us-docker.pkg.dev/perl-cloud-ci/perl-cloud-ci-images/google-cloud-perl-ci-ubuntu:latest
            public-image: ubuntu:24.04
          - name: Rocky Linux 9
            image: us-docker.pkg.dev/perl-cloud-ci/perl-cloud-ci-images/google-cloud-perl-ci-rocky:latest
            public-image: rockylinux:9
          - name: Perl 5.40
            image: us-docker.pkg.dev/perl-cloud-ci/perl-cloud-ci-images/google-cloud-perl-ci-540:latest
            public-image: perl:5.40-slim

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Docker login to Artifact Registry
        id: docker_login
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          if [ -n "$GCP_SA_KEY" ]; then
            printf '%s' "$GCP_SA_KEY" | docker login -u _json_key --password-stdin us-docker.pkg.dev
            echo "authenticated=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::GCP_SA_KEY secret not available (forked PR). Skipping docker login and falling back to public image."
            echo "authenticated=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Build and Test Suite inside Base Container
        run: |
          if [ "${{ steps.docker_login.outputs.authenticated }}" = "true" ]; then
            TARGET_IMAGE="${{ matrix.image }}"
            SETUP_CMD="cp -a /workspace /tmp/work && cd /tmp/work && perl .github/scripts/build_and_test.pl Protobuf Google-Auth Google-gRPC Google-Api-Common Module-Starter-Protobuf"
          else
            TARGET_IMAGE="${{ matrix.public-image }}"
            SETUP_CMD="apt-get update -qq 2>/dev/null || yum install -y gcc make perl 2>/dev/null || true; cp -a /workspace /tmp/work && cd /tmp/work && perl .github/scripts/build_and_test.pl Protobuf Google-Auth Google-gRPC Google-Api-Common Module-Starter-Protobuf"
          fi
          docker run --rm \
            -v "${{ github.workspace }}:/workspace:cached" \
            -w /workspace \
            "$TARGET_IMAGE" \
            bash -lc "$SETUP_CMD"

  windows-matrix:
    name: Windows Perl ${{ matrix.perl-version }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        perl-version: ['5.38', '5.40', '5.42']

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Perl
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: ${{ matrix.perl-version }}

      - name: Run Build and Test Suite
        shell: powershell
        run: |
          perl .github/scripts/build_and_test.pl Protobuf Google-Auth Google-gRPC Google-Api-Common Module-Starter-Protobuf

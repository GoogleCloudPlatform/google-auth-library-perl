name: CI

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main, 'feature/*', 'refactor/*' ]

jobs:
  container-matrix:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Debian 12
            image: us-docker.pkg.dev/perl-cloud-ci/perl-cloud-ci-images/google-cloud-perl-ci-debian:latest
            setup-cmd: sudo apt-get update && sudo apt-get install -y perl cpanminus libssl-dev libcrypt-dev libnghttp2-dev libpcre2-dev libabsl-dev pkg-config protobuf-compiler libtemplate-perl liblocal-lib-perl liblog-any-perl libwww-perl libjson-xs-perl libjson-maybexs-perl libmoo-perl libtype-tiny-perl libpath-tiny-perl libcapture-tiny-perl liburi-perl libfile-which-perl libmodule-starter-perl libtest-exception-perl libtest-deep-perl libtest-mockmodule-perl && sudo cpanm --notest Protocol::HTTP2 Test::LWP::UserAgent Perl::Tidy Perl::Critic Test::Perl::Critic
          - name: Ubuntu 24.04
            image: us-docker.pkg.dev/perl-cloud-ci/perl-cloud-ci-images/google-cloud-perl-ci-ubuntu:latest
            setup-cmd: sudo apt-get update && sudo apt-get install -y perl cpanminus libssl-dev libcrypt-dev libnghttp2-dev libpcre2-dev libabsl-dev pkg-config protobuf-compiler libtemplate-perl liblocal-lib-perl liblog-any-perl libwww-perl libjson-xs-perl libjson-maybexs-perl libmoo-perl libtype-tiny-perl libpath-tiny-perl libcapture-tiny-perl liburi-perl libfile-which-perl libmodule-starter-perl libtest-exception-perl libtest-deep-perl libtest-mockmodule-perl && sudo cpanm --notest Protocol::HTTP2 Test::LWP::UserAgent Perl::Tidy Perl::Critic Test::Perl::Critic
          - name: Rocky Linux 9
            image: us-docker.pkg.dev/perl-cloud-ci/perl-cloud-ci-images/google-cloud-perl-ci-rocky:latest
            setup-cmd: sudo apt-get update && sudo apt-get install -y perl cpanminus libssl-dev libcrypt-dev libnghttp2-dev libpcre2-dev libabsl-dev pkg-config protobuf-compiler libtemplate-perl liblocal-lib-perl liblog-any-perl libwww-perl libjson-xs-perl libjson-maybexs-perl libmoo-perl libtype-tiny-perl libpath-tiny-perl libcapture-tiny-perl liburi-perl libfile-which-perl libmodule-starter-perl libtest-exception-perl libtest-deep-perl libtest-mockmodule-perl && sudo cpanm --notest Protocol::HTTP2 Test::LWP::UserAgent Perl::Tidy Perl::Critic Test::Perl::Critic
          - name: Perl 5.40
            image: us-docker.pkg.dev/perl-cloud-ci/perl-cloud-ci-images/google-cloud-perl-ci-540:latest
            setup-cmd: sudo apt-get update && sudo apt-get install -y perl cpanminus libssl-dev libcrypt-dev libnghttp2-dev libpcre2-dev libabsl-dev pkg-config protobuf-compiler libtemplate-perl liblocal-lib-perl liblog-any-perl libwww-perl libjson-xs-perl libjson-maybexs-perl libmoo-perl libtype-tiny-perl libpath-tiny-perl libcapture-tiny-perl liburi-perl libfile-which-perl libmodule-starter-perl libtest-exception-perl libtest-deep-perl libtest-mockmodule-perl && sudo cpanm --notest Protocol::HTTP2 Test::LWP::UserAgent Perl::Tidy Perl::Critic Test::Perl::Critic

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Docker login to Artifact Registry
        id: docker_login
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          if [ -n "$GCP_SA_KEY" ]; then
            printf '%s' "$GCP_SA_KEY" | docker login -u _json_key --password-stdin us-docker.pkg.dev
            echo "authenticated=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::GCP_SA_KEY secret not available (forked PR). Skipping Artifact Registry and executing on runner host."
            echo "authenticated=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Build and Test Suite
        env:
          AUTHENTICATED: ${{ steps.docker_login.outputs.authenticated }}
          MATRIX_IMAGE: ${{ matrix.image }}
          SETUP_CMD: ${{ matrix.setup-cmd }}
        run: bash .github/scripts/run_ci.sh

